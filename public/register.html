<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e293b">
  <title>Register - Web Links</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { @apply box-border; }
    html, body { @apply bg-gray-50 text-slate-900 h-full; }
    input { @apply border border-gray-300 rounded px-3 py-2 w-full bg-white text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent; }
    .btn-primary { @apply px-4 py-2 rounded font-medium bg-blue-600 text-white hover:bg-blue-700 transition-colors cursor-pointer; }
    input::placeholder { @apply text-gray-400; }
  </style>
</head>
<body class="font-sans flex items-center justify-center min-h-screen px-4">
  <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold mb-2">🔗 Web Links</h1>
      <p class="text-gray-600">Create your account</p>
    </div>

    <form id="registerForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-2">Full Name</label>
        <input type="text" id="name" placeholder="Your Name" required>
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">Password</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6">
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
      </div>

      <div id="errorMessage" class="hidden p-3 bg-red-50 text-red-700 rounded text-sm"></div>

      <button type="submit" class="btn-primary w-full">Create Account</button>
    </form>

    <div class="mt-6 border-t border-gray-200 pt-6">
      <p class="text-center text-gray-600">
        Already have an account?
        <a href="/login.html" class="text-blue-600 hover:text-blue-700 font-medium">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.classList.add('hidden');

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, confirmPassword }),
        });

        const data = await response.json();

        if (!response.ok) {
          errorDiv.textContent = data.error || 'Registration failed';
          errorDiv.classList.remove('hidden');
          return;
        }

        // Store token
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirect to app
        window.location.href = '/';
      } catch (error) {
        errorDiv.textContent = 'Connection error: ' + error.message;
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
