name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x, 18.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build CSS
      run: npm run build

    - name: Check for syntax errors
      run: npm run build

    - name: Verify dist/build files
      run: |
        if [ ! -f public/styles.css ]; then
          echo "CSS not compiled"
          exit 1
        fi

    - name: Lint (if eslint configured)
      run: npm run lint --if-present

    - name: Run tests
      run: npm test --if-present

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Heroku
      if: vars.DEPLOY_PLATFORM == 'heroku'
      uses: akhileshns/heroku-deploy@v3.13.15
      with:
        heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
        heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
        heroku_email: ${{ secrets.HEROKU_EMAIL }}
        buildpack: "heroku/nodejs"
        region: "us"

    - name: Deploy to Railway
      if: vars.DEPLOY_PLATFORM == 'railway'
      run: |
        npm install -g @railway/cli
        railway up -d --token ${{ secrets.RAILWAY_TOKEN }}

    - name: Notify on success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Deployment successful!'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

    - name: Notify on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Deployment failed!'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
